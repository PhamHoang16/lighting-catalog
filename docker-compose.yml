services:
  postgres:
    image: postgres:16-alpine
    container_name: lighting-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lighting}
      POSTGRES_USER: ${POSTGRES_USER:-lighting}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - lighting-pgdata:/var/lib/postgresql/data
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=512MB"
      - "-c"
      - "effective_cache_size=2GB"
      - "-c"
      - "work_mem=8MB"
      - "-c"
      - "max_connections=20"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lighting} -d ${POSTGRES_DB:-lighting}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  lighting-pgdata:
    name: lighting-pgdata
